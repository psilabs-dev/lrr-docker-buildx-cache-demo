name: buildx-cache-demo

on:
  push:
    branches: [dev]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build LRR Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          tags: lanraragi:test
          outputs: type=docker
          cache-from: type=gha,scope=buildkit-linux-amd64
          cache-to: type=gha,mode=max,scope=buildkit-linux-amd64

      - name: Build LRR Docker image
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          tags: lanraragi:test
          outputs: type=docker
          cache-from: |
            type=gha,scope=buildkit-linux-amd64-pr-${{ github.event.number }}
            type=gha,scope=buildkit-linux-amd64
          cache-to: type=gha,mode=max,scope=buildkit-linux-amd64-pr-${{ github.event.number }}
